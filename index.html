<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14171C">
<title>ChatteRx — Cut Audio Analyzer</title>
<meta name="description" content="Live audio spectrum, peak analysis, and session replay for milling cut sounds.">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ChatteRx">
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-name">Chatte<span class="brand-rx">Rx</span></span>
  </div>
  <div class="status" id="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">idle</span>
  </div>
</header>

<main class="app" id="app" data-mode="idle">

  <!-- Dominant peak readout -->
  <section class="readout" aria-live="polite">
    <div class="readout-main">
      <span class="readout-value" id="peakFreq">----</span>
      <span class="readout-unit">Hz</span>
    </div>
    <div class="readout-side">
      <span class="readout-label">DOMINANT<br>PEAK</span>
      <span class="readout-db"><span id="peakDb">--</span> dB</span>
    </div>
  </section>

  <!-- Live spectrum / playhead spectrum -->
  <section class="panel panel-spectrum">
    <div class="panel-head">
      <span class="panel-title">SPECTRUM</span>
      <label class="range-ctl">
        <span>range</span>
        <select id="rangeSelect">
          <option value="2000">0–2 kHz</option>
          <option value="5000" selected>0–5 kHz</option>
          <option value="10000">0–10 kHz</option>
        </select>
      </label>
    </div>
    <div class="panel-body">
      <canvas id="spectrum" class="scope-canvas"></canvas>
    </div>
  </section>

  <!-- Live spectrogram / session timeline -->
  <section class="panel panel-gram">
    <div class="panel-head">
      <span class="panel-title" id="gramTitle">SPECTROGRAM</span>
      <span class="panel-note" id="gramNote">time →</span>
    </div>
    <div class="panel-body">
      <canvas id="spectrogram" class="scope-canvas"></canvas>
      <div class="processing" id="processing" hidden>building timeline…</div>
    </div>
    <!-- Review transport, lives with the timeline -->
    <div class="transport" id="transport" hidden>
      <button id="playBtn" class="t-btn t-play" aria-label="Play">▶</button>
      <span class="t-time" id="timeLabel">0:00 / 0:00</span>
      <button id="exportBtn" class="t-btn t-export">EXPORT .WAV</button>
    </div>
  </section>

  <!-- Peaks as a compact chip strip -->
  <section class="chips-row">
    <span class="chips-label">PEAKS</span>
    <div class="chips" id="peakChips">
      <span class="chip chip-empty">start listening to detect peaks</span>
    </div>
  </section>

  <p class="error" id="errorMsg" hidden></p>

  <!-- Primary control -->
  <div class="controls">
    <button id="toggleBtn" class="btn-main btn-start">START LISTENING</button>
  </div>

</main>

<!-- iOS add-to-home-screen hint -->
<div class="ios-hint" id="iosHint" hidden>
  <p>Install this app: tap <strong>Share</strong> then <strong>Add&nbsp;to&nbsp;Home&nbsp;Screen</strong>.</p>
  <button id="iosHintClose" aria-label="Dismiss">✕</button>
</div>

<script src="./app.js"></script>
</body>
</html>
